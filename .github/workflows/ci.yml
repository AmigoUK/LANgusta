name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Avoid redundant runs on the same ref.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          python-version: "3.12"
          enable-cache: true

      - name: Sync dependencies
        run: uv sync --all-extras

      - name: Lint (ruff)
        run: uv run ruff check src tests scripts

      - name: Architectural boundary lint
        run: uv run python -m scripts.lint_boundaries

      - name: Test (pytest)
        run: uv run pytest -v --tb=short

      - name: CLI smoke (--version)
        run: uv run langusta --version

      - name: CLI smoke (end-to-end walkthrough)
        env:
          LANGUSTA_HOME: ${{ runner.temp }}/langusta
          LANGUSTA_MASTER_PASSWORD: ci-smoke-master-password-long-enough
          LANGUSTA_CRED_SECRET: ci-smoke-community-placeholder
        run: |
          uv run langusta init
          test -f "$LANGUSTA_HOME/db.sqlite"
          uv run langusta add --hostname ci-router --ip 10.0.0.1 --mac aa:bb:cc:dd:ee:ff
          uv run langusta list
          uv run langusta cred add --label ci-snmp --kind snmp_v2c
          uv run langusta cred list
          uv run langusta backup now
          uv run langusta export --output "$LANGUSTA_HOME/dump.json"
          test -s "$LANGUSTA_HOME/dump.json"
          uv run langusta monitor enable --asset 1 --kind icmp --interval 60
          uv run langusta monitor list
          uv run langusta monitor install-service --dry-run
