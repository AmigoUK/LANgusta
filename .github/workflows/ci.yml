name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Avoid redundant runs on the same ref.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          python-version: "3.12"
          enable-cache: true

      - name: Sync dependencies
        run: uv sync --all-extras

      - name: Lint (ruff)
        run: uv run ruff check src tests scripts

      - name: Architectural boundary lint
        run: uv run python -m scripts.lint_boundaries

      - name: Test (pytest)
        run: uv run pytest -v --tb=short

      - name: CLI smoke (--version)
        run: uv run langusta --version

      - name: CLI smoke (init)
        env:
          LANGUSTA_HOME: ${{ runner.temp }}/langusta
        run: |
          uv run langusta init
          test -f "$LANGUSTA_HOME/db.sqlite"
